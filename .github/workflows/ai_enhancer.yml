name: AI Image Enhancer Batch

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Numero di prodotti da elaborare (es. 50)'
        required: false
        default: '50'
  schedule:
    # Esegue automaticamente ogni notte alle 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  enhance_images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run AI Enhancer Script
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ]; then LIMIT="50"; fi
          python advanced_enhancer.py --limit $LIMIT

      - name: Commit and Push Changes
        run: |
          git config --global user.name "AI Enhancer Bot"
          git config --global user.email "actions@github.com"
          git add data/catalog.json data/_advanced_enhance_progress.json
          # Commit solo se ci sono modifiche
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 AI Enhancer: processati nuovi prodotti e aggiornato catalogo" && git push)
